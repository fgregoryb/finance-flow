<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="g" x1="0%" y1="20%" x2="100%" y2="80%">
      <stop offset="0%" stop-color="#2E9BF0"/>
      <stop offset="100%" stop-color="#0B3E8C"/>
    </linearGradient>
  </defs>
  <!-- arco do círculo (aberto no canto superior direito, onde a seta sai) -->
